name: Update naar alle klanten

# Hiermee update u alle klanten tegelijk, of een specifieke klant.
# Ga naar GitHub → Actions → "Update naar alle klanten" → Run workflow.
# U kiest zelf: alle klanten of één specifieke (via klant-ID).

on:
  workflow_dispatch:
    inputs:
      klant_id:
        description: 'Klant-ID om bij te werken (leeg = alle klanten)'
        required: false
        default: ''
      versie_notitie:
        description: 'Wat is er nieuw in deze update? (wordt getoond aan klanten)'
        required: true
        default: 'Bugfixes en verbeteringen'

jobs:
  bepaal-klanten:
    name: Klantenlijst ophalen
    runs-on: ubuntu-latest
    outputs:
      klanten: ${{ steps.haal_op.outputs.klanten }}
    steps:
      - name: Klantenlijst ophalen uit registry
        id: haal_op
        run: |
          # Haal klantenlijst op uit het KLANTEN_REGISTRY secret
          # Dit is een JSON array van { id, script_id, naam } objecten
          KLANTEN='${{ secrets.KLANTEN_REGISTRY }}'
          KLANT_ID='${{ github.event.inputs.klant_id }}'

          if [ -n "$KLANT_ID" ]; then
            # Filter op specifieke klant
            GEFILTERD=$(echo "$KLANTEN" | jq --arg id "$KLANT_ID" '[.[] | select(.id == $id)]')
            echo "klanten=$GEFILTERD" >> $GITHUB_OUTPUT
          else
            echo "klanten=$KLANTEN" >> $GITHUB_OUTPUT
          fi

  deploy-per-klant:
    name: Deployen naar ${{ matrix.klant.naam }}
    runs-on: ubuntu-latest
    needs: bepaal-klanten
    strategy:
      matrix:
        klant: ${{ fromJson(needs.bepaal-klanten.outputs.klanten) }}
      fail-fast: false  # Ga door met andere klanten als één mislukt

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp installeren
        run: npm install -g @google/clasp

      - name: clasp credentials instellen
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Script ID instellen voor klant
        run: |
          # Vervang het script ID in .clasp.json met het script ID van de klant
          jq --arg scriptId "${{ matrix.klant.script_id }}" \
             '.scriptId = $scriptId' .clasp.json > .clasp.tmp.json
          mv .clasp.tmp.json .clasp.json

      - name: Code pushen naar klant
        run: clasp push --force

      - name: Versie registreren
        run: |
          echo "✅ ${{ matrix.klant.naam }} (ID: ${{ matrix.klant.id }}) bijgewerkt"
          echo "   Versienotitie: ${{ github.event.inputs.versie_notitie }}"

  rapporteer:
    name: Update rapport
    runs-on: ubuntu-latest
    needs: deploy-per-klant
    if: always()
    steps:
      - name: Rapport genereren
        run: |
          echo "=== UPDATE RAPPORT ==="
          echo "Datum: $(date)"
          echo "Versienotitie: ${{ github.event.inputs.versie_notitie }}"
          echo "Klant-ID filter: '${{ github.event.inputs.klant_id }}' (leeg = alle)"
          echo "Status: ${{ needs.deploy-per-klant.result }}"
