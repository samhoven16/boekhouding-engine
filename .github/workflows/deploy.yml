name: CI/CD — Boekhoudbaar

on:
  push:
    branches:
      - main
      - claude/google-forms-accounting-system-0N1Mx
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Annuleer oudere runs op dezelfde branch (geen dubbele deploys)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── JOB 1: LINT ──────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Installeer dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  # ── JOB 2: TESTS ─────────────────────────────────────────────
  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Installeer dependencies
        run: npm ci
      - name: Jest
        run: npm test

  # ── JOB 3: DEPLOY (alleen op production branches) ────────────
  deploy:
    name: Deploy naar Apps Script
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Alleen deployen vanuit production branches, niet vanuit PR's
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: clasp installeren
        run: npm install -g @google/clasp

      - name: Projectafhankelijkheden installeren
        run: npm ci

      - name: Credentials normaliseren en schrijven
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          python3 << 'PYTHON'
          import json, os, sys

          raw = os.environ.get('CLASP_CREDENTIALS', '').strip()
          if not raw:
              print("::error title=Secret ontbreekt::CLASP_CREDENTIALS is leeg. Ga naar Settings → Secrets → Actions en voeg toe.")
              sys.exit(1)

          try:
              creds, _ = json.JSONDecoder().raw_decode(raw)
          except json.JSONDecodeError as e:
              print(f"::error title=Ongeldige JSON::JSON-fout: {e}.")
              sys.exit(1)

          # Formaat A: {"tokens": {"default": {...}}} — gcloud / nieuwe clasp
          if 'tokens' in creds and 'default' in creds.get('tokens', {}):
              d = creds['tokens']['default']
              clasp_creds = {
                  "token": {
                      "access_token":  d.get("access_token", ""),
                      "refresh_token": d.get("refresh_token", ""),
                      "token_type":    d.get("token_type", "Bearer"),
                      "expiry_date":   d.get("expiry_date", 0)
                  },
                  "oauth2ClientSettings": {
                      "clientId":     d.get("client_id", ""),
                      "clientSecret": d.get("client_secret", ""),
                      "redirectUri":  "http://localhost"
                  },
                  "isLocalCreds": False
              }
              import time
              exp = d.get("expiry_date", 0)
              geldig = "nog geldig" if exp > time.time() * 1000 else "verlopen — refresh_token wordt gebruikt"
              print(f"✓ Credential-formaat geconverteerd — token: {geldig}")

          # Formaat B: standaard clasp {"token": {...}}
          elif 'token' in creds:
              clasp_creds = creds
              import time
              exp = creds.get("token", {}).get("expiry_date", 0)
              geldig = "nog geldig" if exp > time.time() * 1000 else "verlopen — refresh_token wordt gebruikt"
              print(f"✓ Credentials in clasp-formaat — token: {geldig}")

          else:
              print(f"::error title=Onbekend formaat::Sleutels: {list(creds.keys())}. Verwacht 'token' of 'tokens'.")
              sys.exit(1)

          path = os.path.expanduser('~/.clasprc.json')
          with open(path, 'w') as f:
              json.dump(clasp_creds, f)
          os.chmod(path, 0o600)
          print("✓ ~/.clasprc.json geschreven")
          PYTHON

      - name: clasp push
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          echo "clasp versie: $(clasp --version)"
          echo "Script ID:    $(python3 -c "import json; print(json.load(open('.clasp.json'))['scriptId'])")"

          set +e
          OUTPUT=$(clasp push --force 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT -ne 0 ]; then
            if echo "$OUTPUT" | grep -qi "login\|auth\|401\|403\|credential"; then
              echo "::error title=Authenticatie mislukt::Vernieuw CLASP_CREDENTIALS in GitHub Settings → Secrets → Actions."
            else
              echo "::error title=clasp push mislukt::$(echo "$OUTPUT" | head -3 | tr '\n' ' ')"
            fi
            exit $EXIT
          fi
          echo "✅ Deployment geslaagd"
