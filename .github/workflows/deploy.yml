name: Auto Deploy naar Google Apps Script

on:
  push:
    branches:
      - main
      - claude/google-forms-accounting-system-0N1Mx
  workflow_dispatch:

jobs:
  deploy:
    name: Deployen naar Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: clasp installeren
        run: npm install -g @google/clasp

      - name: Diagnose — secret aanwezig?
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          if [ -z "$CLASP_CREDENTIALS" ]; then
            echo "::error title=Secret ontbreekt::CLASP_CREDENTIALS is leeg of niet ingesteld."
            exit 1
          fi
          LENGTE=${#CLASP_CREDENTIALS}
          EERSTE_CHAR="${CLASP_CREDENTIALS:0:1}"
          LAATSTE_CHAR="${CLASP_CREDENTIALS: -1}"
          echo "✓ CLASP_CREDENTIALS ingesteld"
          echo "  Lengte: $LENGTE tekens"
          echo "  Begint met: '$EERSTE_CHAR'"
          echo "  Eindigt met: '$LAATSTE_CHAR'"
          # Valideer JSON-formaat
          JSON_FOUT=$(echo "$CLASP_CREDENTIALS" | python3 -c "import json,sys; d=json.load(sys.stdin); print('geldig, sleutels:', list(d.keys()))" 2>&1)
          if [ $? -ne 0 ]; then
            echo "::error title=Ongeldige JSON::Lengte=$LENGTE, begint='$EERSTE_CHAR', eindigt='$LAATSTE_CHAR'. Fout: $JSON_FOUT"
            echo "::error::Verwacht: inhoud van ~/.clasprc.json (begint met { eindigt met })"
            exit 1
          fi
          echo "✓ JSON geldig: $JSON_FOUT"

      - name: clasp credentials instellen
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: clasp push
        run: |
          echo "clasp versie: $(clasp --version)"
          echo "Script ID: $(python3 -c "import json; print(json.load(open('.clasp.json'))['scriptId'])")"
          echo "Bestanden in src/: $(ls src/ | wc -l)"

          # Voer clasp push uit en vang de output op
          set +e
          PUSH_OUTPUT=$(clasp push --force 2>&1)
          PUSH_EXIT=$?
          set -e

          echo "$PUSH_OUTPUT"

          if [ $PUSH_EXIT -ne 0 ]; then
            # Eerste 3 regels van de fout als annotatie
            FOUT=$(echo "$PUSH_OUTPUT" | head -5 | tr '\n' ' ')
            echo "::error title=clasp push mislukt::$FOUT"
            echo ""
            echo "Mogelijke oorzaken:"
            echo "  1) OAuth token verlopen → hernieuw: clasp login && cat ~/.clasprc.json → update CLASP_CREDENTIALS secret"
            echo "  2) Script ID onbekend → controleer .clasp.json scriptId"
            echo "  3) Geen write-rechten op het Apps Script project"
            exit $PUSH_EXIT
          fi

          echo "✅ Deployment geslaagd"
