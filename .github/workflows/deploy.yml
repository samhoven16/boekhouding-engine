name: CI/CD — Boekhoudbaar

on:
  push:
    branches:
      - main
      - claude/google-forms-accounting-system-0N1Mx
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Annuleer oudere runs op dezelfde branch (geen dubbele deploys)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── JOB 1: LINT ──────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Installeer dependencies
        run: npm ci
        env:
          HUSKY: '0'
      - name: ESLint
        run: npm run lint

  # ── JOB 2: TESTS ─────────────────────────────────────────────
  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Installeer dependencies
        run: npm ci
        env:
          HUSKY: '0'
      - name: Jest
        run: npm test

  # ── JOB 3: DEPLOY (alleen op production branches) ────────────
  deploy:
    name: Deploy naar Apps Script
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Alleen deployen vanuit production branches, niet vanuit PR's
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Job-level env zodat step-level `if: env.X != ''` wél evalueert
      # (step-level `env` is niet beschikbaar voor de step's eigen if-conditie).
      LICENCE_DEPLOYMENT_ID: ${{ secrets.LICENCE_DEPLOYMENT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: clasp installeren
        run: npm install -g @google/clasp

      - name: Projectafhankelijkheden installeren
        run: npm ci

      - name: Credentials normaliseren en token vernieuwen
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          python3 << 'PYTHON'
          import json, os, sys, time, urllib.request, urllib.parse

          raw = os.environ.get('CLASP_CREDENTIALS', '').strip()
          if not raw:
              print("::error title=Secret ontbreekt::CLASP_CREDENTIALS is leeg. Ga naar Settings → Secrets → Actions en voeg toe.")
              sys.exit(1)

          try:
              creds, _ = json.JSONDecoder().raw_decode(raw)
          except json.JSONDecodeError as e:
              print(f"::error title=Ongeldige JSON::JSON-fout: {e}.")
              sys.exit(1)

          # Normaliseer naar clasp-formaat
          # Formaat A: {"tokens": {"default": {...}}} — gcloud / nieuwe clasp
          if 'tokens' in creds and 'default' in creds.get('tokens', {}):
              d = creds['tokens']['default']
              token_data    = { "access_token": d.get("access_token",""), "refresh_token": d.get("refresh_token",""),
                                "token_type": d.get("token_type","Bearer"), "expiry_date": d.get("expiry_date",0) }
              oauth_settings = { "clientId": d.get("client_id",""), "clientSecret": d.get("client_secret",""),
                                 "redirectUri": "http://localhost" }
          # Formaat B: standaard clasp {"token": {...}}
          elif 'token' in creds:
              token_data    = creds['token']
              oauth_settings = creds.get('oauth2ClientSettings', {})
          else:
              print(f"::error title=Onbekend formaat::Sleutels: {list(creds.keys())}. Verwacht 'token' of 'tokens'.")
              sys.exit(1)

          refresh_token  = token_data.get('refresh_token', '')
          client_id      = oauth_settings.get('clientId', '')
          client_secret  = oauth_settings.get('clientSecret', '')

          if not refresh_token:
              print("::error title=Geen refresh_token::CLASP_CREDENTIALS mist een refresh_token. Zie INFRA.md §Clasp.")
              sys.exit(1)

          # Vernieuw access_token via Google OAuth2 — zodat CI nooit faalt door een verlopen token
          new_access  = token_data.get('access_token', '')
          new_expiry  = token_data.get('expiry_date', 0)

          if client_id and client_secret:
              try:
                  body = urllib.parse.urlencode({
                      'client_id': client_id, 'client_secret': client_secret,
                      'refresh_token': refresh_token, 'grant_type': 'refresh_token',
                  }).encode()
                  req = urllib.request.Request('https://oauth2.googleapis.com/token', data=body, method='POST')
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      new_token = json.loads(resp.read())
                  new_access = new_token['access_token']
                  new_expiry = int(time.time() * 1000) + new_token.get('expires_in', 3600) * 1000
                  print(f"✓ Access token vernieuwd (geldig {new_token.get('expires_in',3600)}s)")
              except Exception as e:
                  print(f"::warning::Token-refresh mislukt ({e}) — clasp probeert zelf te vernieuwen")
          else:
              # Geen OAuth-app-credentials in secret — clasp gebruikt ingebouwde credentials
              print("ℹ️  Geen clientId/clientSecret in secret; clasp vernieuwt intern (standaard clasp-login)")

          clasp_creds = {
              "token": { "access_token": new_access, "refresh_token": refresh_token,
                         "token_type": "Bearer", "expiry_date": new_expiry },
              "oauth2ClientSettings": oauth_settings,
              "isLocalCreds": False
          }

          path = os.path.expanduser('~/.clasprc.json')
          with open(path, 'w') as f:
              json.dump(clasp_creds, f)
          os.chmod(path, 0o600)
          print("✓ ~/.clasprc.json geschreven met vers token")
          PYTHON

      - name: clasp push (klant-kopie)
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          echo "clasp versie: $(clasp --version)"
          echo "Script ID:    $(python3 -c "import json; print(json.load(open('.clasp.json'))['scriptId'])")"

          set +e
          OUTPUT=$(clasp push --force 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT -ne 0 ]; then
            if echo "$OUTPUT" | grep -qi "login\|auth\|401\|403\|credential"; then
              echo "::error title=Authenticatie mislukt::Vernieuw CLASP_CREDENTIALS in GitHub Settings → Secrets → Actions."
            else
              echo "::error title=clasp push mislukt (klant-kopie)::$(echo "$OUTPUT" | head -3 | tr '\n' ' ')"
            fi
            exit $EXIT
          fi
          echo "✅ Klant-kopie gepusht"
          echo "ℹ️  Klant-kopie is container-bound aan template-sheet; geen /exec URL."
          echo "    Nieuwe klanten krijgen automatisch de nieuwste code bij kopiëren."
          echo "    Bestaande klanten houden hun eigen snapshot (by design)."

      - name: clasp push (licentieserver)
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          cd licence-server
          echo "Script ID:    $(python3 -c "import json; print(json.load(open('.clasp.json'))['scriptId'])")"

          set +e
          OUTPUT=$(clasp push --force 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT -ne 0 ]; then
            echo "::error title=clasp push mislukt (licentieserver)::$(echo "$OUTPUT" | head -3 | tr '\n' ' ')"
            exit $EXIT
          fi
          echo "✅ Licentieserver gepusht (HEAD)"
          echo ""
          echo "⚠️  LET OP: clasp push update alleen de HEAD van de licentieserver."
          echo "    De live /exec URL blijft op de vorige deployed version totdat er"
          echo "    een nieuwe versie wordt gepubliceerd. Zie DEPLOYMENT.md voor de"
          echo "    eenmalige handmatige stap, of stel LICENCE_DEPLOYMENT_ID in als"
          echo "    secret om dit automatisch te doen."

      - name: clasp deploy (licentieserver — optioneel)
        if: ${{ env.LICENCE_DEPLOYMENT_ID != '' }}
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          cd licence-server
          set +e
          OUTPUT=$(clasp deploy --deploymentId "$LICENCE_DEPLOYMENT_ID" --description "CI auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "::warning title=Automatische deploy mislukt::Live /exec URL is nog niet bijgewerkt. Deploy handmatig via Apps Script UI."
          else
            echo "✅ Live /exec URL bijgewerkt"
          fi

      - name: Cloudflare cache purge (optioneel)
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ZONE_ID != '' }}
        run: |
          HTTP=$(curl -s -o /tmp/cf_purge.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          cat /tmp/cf_purge.json
          if [ "$HTTP" = "200" ]; then
            echo "✅ Cloudflare edge-cache geleegd"
          else
            echo "::warning title=CF cache purge mislukt (HTTP $HTTP)::Controleer CF_API_TOKEN en CF_ZONE_ID secrets."
          fi

