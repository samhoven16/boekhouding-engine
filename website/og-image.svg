<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b6e"/>
      <stop offset="50%" style="stop-color:#1A237E"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtiele grid-decoratie -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Accent cirkel rechts -->
  <circle cx="1050" cy="315" r="280" fill="rgba(0,172,193,0.06)"/>
  <circle cx="1050" cy="315" r="180" fill="rgba(0,172,193,0.06)"/>

  <!-- Badge -->
  <rect x="80" y="110" width="260" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="210" y="134" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">✦ EENMALIG €49 — GEEN ABO</text>

  <!-- Logo/naam -->
  <text x="80" y="240" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="white">Boekhoud</text>
  <text x="598" y="240" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="#00ACC1">baar</text>

  <!-- Tagline -->
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.80)">Jouw ZZP-boekhouding. In jouw Drive.</text>

  <!-- Divider -->
  <line x1="80" y1="340" x2="700" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Feature pills -->
  <rect x="80" y="365" width="190" height="38" rx="8" fill="rgba(255,255,255,0.10)"/>
  <text x="175" y="389" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">📊 BTW-aangifte auto</text>

  <rect x="282" y="365" width="170" height="38" rx="8" fill="rgba(255,255,255,0.10)"/>
  <text x="367" y="389" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">🧾 PDF-facturen</text>

  <rect x="464" y="365" width="175" height="38" rx="8" fill="rgba(255,255,255,0.10)"/>
  <text x="551" y="389" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">💰 Belastingadvies</text>

  <!-- URL -->
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.50)" letter-spacing="0.5">boekhoudbaar.nl</text>

  <!-- Prijs rechts -->
  <text x="1050" y="280" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="rgba(255,255,255,0.5)" text-anchor="middle">EENMALIG</text>
  <text x="1050" y="360" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="white" text-anchor="middle">€49</text>
  <text x="1050" y="400" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)" text-anchor="middle">geen abonnement</text>
</svg>
