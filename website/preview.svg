<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Boekhoudbaar dashboard preview">
  <title>Boekhoudbaar dashboard — omzet, kosten, winst en BTW-saldo in één overzicht</title>

  <!-- Canvas -->
  <rect width="1200" height="720" fill="#F7F9FC"/>

  <!-- Window chrome -->
  <rect x="24" y="24" width="1152" height="672" rx="12" fill="#FFFFFF" stroke="#E5EAF2" stroke-width="1"/>
  <rect x="24" y="24" width="1152" height="40" rx="12" fill="#F7F9FC"/>
  <rect x="24" y="56" width="1152" height="8" fill="#F7F9FC"/>
  <circle cx="48" cy="44" r="5" fill="#E5EAF2"/>
  <circle cx="66" cy="44" r="5" fill="#E5EAF2"/>
  <circle cx="84" cy="44" r="5" fill="#E5EAF2"/>
  <rect x="120" y="34" width="240" height="20" rx="4" fill="#FFFFFF" stroke="#E5EAF2" stroke-width="1"/>
  <text x="132" y="48" font-family="Inter, -apple-system, Arial, sans-serif" font-size="11" fill="#5F6B7A">Dashboard — Boekhouding 2026</text>

  <!-- Tab bar -->
  <g font-family="Inter, -apple-system, Arial, sans-serif" font-size="12" font-weight="600">
    <rect x="40" y="84" width="96" height="26" rx="4" fill="#0D1B4E"/>
    <text x="88" y="101" text-anchor="middle" fill="#FFFFFF">Dashboard</text>
    <text x="170" y="101" fill="#5F6B7A">Verkoopfacturen</text>
    <text x="304" y="101" fill="#5F6B7A">Inkoopfacturen</text>
    <text x="430" y="101" fill="#5F6B7A">Bank</text>
    <text x="494" y="101" fill="#5F6B7A">BTW</text>
    <text x="550" y="101" fill="#5F6B7A">Rapportages</text>
  </g>

  <!-- KPI cards -->
  <g font-family="Inter, -apple-system, Arial, sans-serif">
    <!-- Omzet -->
    <rect x="40" y="138" width="268" height="120" rx="10" fill="#FFFFFF" stroke="#E5EAF2"/>
    <text x="60" y="166" font-size="11" font-weight="600" letter-spacing="1" fill="#5F6B7A">OMZET Q1</text>
    <text x="60" y="208" font-size="30" font-weight="800" fill="#0D1B4E">€ 42.180</text>
    <text x="60" y="232" font-size="12" fill="#2EC4B6">▲ 12% t.o.v. Q4</text>

    <!-- Kosten -->
    <rect x="322" y="138" width="268" height="120" rx="10" fill="#FFFFFF" stroke="#E5EAF2"/>
    <text x="342" y="166" font-size="11" font-weight="600" letter-spacing="1" fill="#5F6B7A">KOSTEN Q1</text>
    <text x="342" y="208" font-size="30" font-weight="800" fill="#0D1B4E">€ 8.940</text>
    <text x="342" y="232" font-size="12" fill="#5F6B7A">21% van omzet</text>

    <!-- Winst -->
    <rect x="604" y="138" width="268" height="120" rx="10" fill="#FFFFFF" stroke="#E5EAF2"/>
    <text x="624" y="166" font-size="11" font-weight="600" letter-spacing="1" fill="#5F6B7A">NETTOWINST</text>
    <text x="624" y="208" font-size="30" font-weight="800" fill="#0D1B4E">€ 33.240</text>
    <text x="624" y="232" font-size="12" fill="#2EC4B6">▲ 18% t.o.v. Q4</text>

    <!-- BTW -->
    <rect x="886" y="138" width="274" height="120" rx="10" fill="rgba(46,196,182,.08)" stroke="rgba(46,196,182,.35)"/>
    <text x="906" y="166" font-size="11" font-weight="600" letter-spacing="1" fill="#0D1B4E">BTW-SALDO Q1</text>
    <text x="906" y="208" font-size="30" font-weight="800" fill="#0D1B4E">€ 6.218</text>
    <text x="906" y="232" font-size="12" fill="#5F6B7A">Aangifte: 30 apr</text>
  </g>

  <!-- Chart card -->
  <rect x="40" y="280" width="720" height="288" rx="10" fill="#FFFFFF" stroke="#E5EAF2"/>
  <text x="60" y="312" font-family="Inter, -apple-system, Arial, sans-serif" font-size="14" font-weight="700" fill="#0D1B4E">Omzet vs. kosten · 2026</text>
  <text x="60" y="332" font-family="Inter, -apple-system, Arial, sans-serif" font-size="11" fill="#5F6B7A">Per maand, inclusief BTW</text>

  <!-- Chart gridlines -->
  <g stroke="#E5EAF2" stroke-width="1">
    <line x1="80" y1="540" x2="740" y2="540"/>
    <line x1="80" y1="490" x2="740" y2="490"/>
    <line x1="80" y1="440" x2="740" y2="440"/>
    <line x1="80" y1="390" x2="740" y2="390"/>
  </g>

  <!-- Chart bars (omzet navy, kosten teal) -->
  <g>
    <!-- Jan -->
    <rect x="110" y="420" width="18" height="120" fill="#0D1B4E" rx="2"/>
    <rect x="130" y="500" width="18" height="40" fill="#2EC4B6" rx="2"/>
    <!-- Feb -->
    <rect x="180" y="400" width="18" height="140" fill="#0D1B4E" rx="2"/>
    <rect x="200" y="495" width="18" height="45" fill="#2EC4B6" rx="2"/>
    <!-- Mrt -->
    <rect x="250" y="385" width="18" height="155" fill="#0D1B4E" rx="2"/>
    <rect x="270" y="498" width="18" height="42" fill="#2EC4B6" rx="2"/>
    <!-- Apr -->
    <rect x="320" y="410" width="18" height="130" fill="#0D1B4E" rx="2"/>
    <rect x="340" y="503" width="18" height="37" fill="#2EC4B6" rx="2"/>
    <!-- Mei -->
    <rect x="390" y="395" width="18" height="145" fill="#0D1B4E" rx="2"/>
    <rect x="410" y="496" width="18" height="44" fill="#2EC4B6" rx="2"/>
    <!-- Jun -->
    <rect x="460" y="405" width="18" height="135" fill="#0D1B4E" rx="2"/>
    <rect x="480" y="499" width="18" height="41" fill="#2EC4B6" rx="2"/>
    <!-- Jul -->
    <rect x="530" y="390" width="18" height="150" fill="#0D1B4E" rx="2"/>
    <rect x="550" y="494" width="18" height="46" fill="#2EC4B6" rx="2"/>
    <!-- Aug -->
    <rect x="600" y="415" width="18" height="125" fill="#0D1B4E" rx="2"/>
    <rect x="620" y="505" width="18" height="35" fill="#2EC4B6" rx="2"/>
    <!-- Sep -->
    <rect x="670" y="380" width="18" height="160" fill="#0D1B4E" rx="2"/>
    <rect x="690" y="492" width="18" height="48" fill="#2EC4B6" rx="2"/>
  </g>

  <!-- Month labels -->
  <g font-family="Inter, -apple-system, Arial, sans-serif" font-size="10" fill="#5F6B7A" text-anchor="middle">
    <text x="128" y="560">jan</text>
    <text x="198" y="560">feb</text>
    <text x="268" y="560">mrt</text>
    <text x="338" y="560">apr</text>
    <text x="408" y="560">mei</text>
    <text x="478" y="560">jun</text>
    <text x="548" y="560">jul</text>
    <text x="618" y="560">aug</text>
    <text x="688" y="560">sep</text>
  </g>

  <!-- Legend -->
  <g font-family="Inter, -apple-system, Arial, sans-serif" font-size="11" fill="#5F6B7A">
    <rect x="580" y="308" width="10" height="10" fill="#0D1B4E" rx="2"/>
    <text x="596" y="317">Omzet</text>
    <rect x="640" y="308" width="10" height="10" fill="#2EC4B6" rx="2"/>
    <text x="656" y="317">Kosten</text>
  </g>

  <!-- Recent invoices card -->
  <rect x="776" y="280" width="384" height="288" rx="10" fill="#FFFFFF" stroke="#E5EAF2"/>
  <text x="796" y="312" font-family="Inter, -apple-system, Arial, sans-serif" font-size="14" font-weight="700" fill="#0D1B4E">Openstaande facturen</text>
  <text x="796" y="332" font-family="Inter, -apple-system, Arial, sans-serif" font-size="11" fill="#5F6B7A">4 openstaand · totaal € 9.640</text>

  <!-- Invoice rows -->
  <g font-family="Inter, -apple-system, Arial, sans-serif" font-size="12">
    <g>
      <line x1="796" y1="358" x2="1140" y2="358" stroke="#E5EAF2"/>
      <text x="796" y="380" fill="#0D1B4E" font-weight="600">2026-041 · Studio Veld</text>
      <text x="796" y="398" fill="#5F6B7A" font-size="11">Verstuurd 12 mrt · vervalt 11 apr</text>
      <text x="1140" y="385" text-anchor="end" fill="#0D1B4E" font-weight="700">€ 2.420</text>
    </g>
    <g>
      <line x1="796" y1="418" x2="1140" y2="418" stroke="#E5EAF2"/>
      <text x="796" y="440" fill="#0D1B4E" font-weight="600">2026-040 · Kuipers &amp; Co</text>
      <text x="796" y="458" fill="#5F6B7A" font-size="11">Verstuurd 08 mrt · vervalt 07 apr</text>
      <text x="1140" y="445" text-anchor="end" fill="#0D1B4E" font-weight="700">€ 1.815</text>
    </g>
    <g>
      <line x1="796" y1="478" x2="1140" y2="478" stroke="#E5EAF2"/>
      <text x="796" y="500" fill="#0D1B4E" font-weight="600">2026-039 · Bloem Ontwerp</text>
      <text x="796" y="518" fill="#B91C1C" font-size="11">⚠ Vervallen sinds 2 apr</text>
      <text x="1140" y="505" text-anchor="end" fill="#B91C1C" font-weight="700">€ 3.200</text>
    </g>
    <g>
      <line x1="796" y1="538" x2="1140" y2="538" stroke="#E5EAF2"/>
      <text x="796" y="560" fill="#0D1B4E" font-weight="600">2026-038 · Timmerman BV</text>
      <text x="796" y="578" fill="#5F6B7A" font-size="11">Verstuurd 02 mrt · vervalt 01 apr</text>
      <text x="1140" y="565" text-anchor="end" fill="#0D1B4E" font-weight="700">€ 2.205</text>
    </g>
  </g>

  <!-- Bottom status row -->
  <rect x="40" y="588" width="1120" height="80" rx="10" fill="rgba(46,196,182,.05)" stroke="rgba(46,196,182,.2)"/>
  <g font-family="Inter, -apple-system, Arial, sans-serif">
    <text x="60" y="618" font-size="11" font-weight="600" letter-spacing="1" fill="#5F6B7A">VOLGENDE TAAK</text>
    <text x="60" y="646" font-size="14" font-weight="700" fill="#0D1B4E">BTW-aangifte Q1 — bijna klaar</text>
    <text x="60" y="663" font-size="11" fill="#5F6B7A">Rubriek 1a, 1b en 3b automatisch berekend · klaar om over te nemen</text>
    <rect x="988" y="618" width="148" height="34" rx="6" fill="#0D1B4E"/>
    <text x="1062" y="640" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Aangifte openen →</text>
  </g>
</svg>
